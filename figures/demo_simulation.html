<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pedestrian Flow Simulation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #64707d;
      --line: #d7dce2;
      --track: #e7eaee;
      --track-edge: #bcc5ce;
      --accent: #0f766e;
      --accent-2: #d97706;
      --accent-3: #be123c;
      --blue: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 750;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.95fr);
      gap: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }
    .panel-title {
      font-weight: 700;
      font-size: 15px;
    }
    .panel-note {
      color: var(--muted);
      font-size: 12px;
    }
    .canvas-wrap { padding: 10px 12px 14px; }
    canvas {
      display: block;
      width: 100%;
      background: #fbfcfa;
      border: 1px solid #edf0f2;
      border-radius: 6px;
    }
    #ringCanvas { height: 390px; }
    #speedCanvas { height: 190px; }
    #spaceCanvas { height: 270px; }
    .side {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 14px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 78px;
      background: #fcfdfb;
    }
    .stat label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .stat strong {
      font-size: 24px;
      line-height: 1;
    }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      padding: 14px;
      align-items: center;
      border-top: 1px solid var(--line);
    }
    button, select {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      height: 38px;
      padding: 0 12px;
      font: inherit;
      cursor: pointer;
    }
    button {
      min-width: 88px;
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
      font-weight: 650;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }
    .key {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .swatch {
      width: 18px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--accent), var(--accent-2), var(--accent-3));
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .badge { white-space: normal; }
      #ringCanvas { height: 320px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Pedestrian Flow Simulation</h1>
        <div class="subtitle">Remote-action single-file movement near the Fig. 2 velocity gap</div>
      </div>
      <div class="badge" id="caseBadge"></div>
    </header>

    <section class="grid">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Ring Movement</div>
            <div class="panel-note">Each marker is one pedestrian; color tracks instantaneous velocity.</div>
          </div>
          <div class="legend"><span class="key"><span class="swatch"></span> slow to fast</span></div>
        </div>
        <div class="canvas-wrap"><canvas id="ringCanvas"></canvas></div>
        <div class="controls">
          <button id="playButton" type="button">Pause</button>
          <input id="frameSlider" type="range" min="0" max="0" value="0">
          <select id="speedSelect" aria-label="Playback speed">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>
      </div>

      <aside class="side">
        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">Run State</div>
            <div class="panel-note" id="timeLabel"></div>
          </div>
          <div class="stats">
            <div class="stat"><label>density rho</label><strong id="densityStat"></strong></div>
            <div class="stat"><label>pedestrians</label><strong id="nStat"></strong></div>
            <div class="stat"><label>mean velocity</label><strong id="velocityStat"></strong></div>
            <div class="stat"><label>model b</label><strong id="bStat"></strong></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">Mean Velocity</div>
            <div class="panel-note">m/s over animation time</div>
          </div>
          <div class="canvas-wrap"><canvas id="speedCanvas"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">Space-Time Trace</div>
            <div class="panel-note">position x across recent frames</div>
          </div>
          <div class="canvas-wrap"><canvas id="spaceCanvas"></canvas></div>
        </div>
      </aside>
    </section>
  </main>

,0.7278,0.7303,0.7328,0.7351,0.7373,0.7393,0.7411,0.7427,0.744,0.745,0.7457,0.746,0.7457,0.7442,0.7409,0.7353,0.727,0.7186,0.7214,0.7242,0.7268,0.7294,0.7318,0.734,0.7361,0.7379,0.7394,0.7406,0.7412,0.7412,0.7402,0.738,0.7341,0.7278,0.719,0.7127,0.7154,0.718,0.7206,0.723,0.7253,0.7274,0.7293,0.7308,0.7319,0.7324,0.7321,0.7306,0.7273,0.7217,0.7133,0.7027,0.7032,0.7055,0.7078,0.7103,0.7128,0.7154,0.7179],"time":[0.0,0.025,0.05,0.075,0.1,0.125,0.15,0.175,0.2,0.225,0.25,0.275,0.3,0.325,0.35,0.375,0.4,0.425,0.45,0.475,0.5,0.525,0.55,0.575,0.6,0.625,0.65,0.675,0.7,0.725,0.75,0.775,0.8,0.825,0.85,0.875,0.9,0.925,0.95,0.975,1.0,1.025,1.05,1.075,1.1,1.125,1.15,1.175,1.2,1.225,1.25,1.275,1.3,1.325,1.35,1.375,1.4,1.425,1.45,1.475,1.5,1.525,1.55,1.575,1.6,1.625,1.65,1.675,1.7,1.725,1.75,1.775,1.8,1.825,1.85,1.875,1.9,1.925,1.95,1.975,2.0,2.025,2.05,2.075,2.1,2.125,2.15,2.175,2.2,2.225,2.25,2.275,2.3,2.325,2.35,2.375,2.4,2.425,2.45,2.475,2.5,2.525,2.55,2.575,2.6,2.625,2.65,2.675,2.7,2.725,2.75,2.775,2.8,2.825,2.85,2.875,2.9,2.925,2.95,2.975,3.0,3.025,3.05,3.075,3.1,3.125,3.15,3.175,3.2,3.225,3.25,3.275,3.3,3.325,3.35,3.375,3.4,3.425,3.45,3.475,3.5,3.525,3.55,3.575,3.6,3.625,3.65,3.675,3.7,3.725,3.75,3.775,3.8,3.825,3.85,3.875,3.9,3.925,3.95,3.975,4.0,4.025,4.05,4.075,4.1,4.125,4.15,4.175,4.2,4.225,4.25,4.275,4.3,4.325,4.35,4.375,4.4,4.425,4.45,4.475,4.5,4.525,4.55,4.575,4.6,4.625,4.65,4.675,4.7,4.725,4.75,4.775,4.8,4.825,4.85,4.875,4.9,4.925,4.95,4.975,5.0,5.025,5.05,5.075,5.1,5.125,5.15,5.175,5.2,5.225,5.25,5.275,5.3,5.325,5.35,5.375,5.4,5.425,5.45,5.475,5.5,5.525,5.55,5.575,5.6,5.625,5.65,5.675,5.7,5.725,5.75,5.775,5.8,5.825,5.85,5.875,5.9,5.925,5.95,5.975]};
    const ringCanvas = document.getElementById("ringCanvas");
    const speedCanvas = document.getElementById("speedCanvas");
    const spaceCanvas = document.getElementById("spaceCanvas");
    const playButton = document.getElementById("playButton");
    const frameSlider = document.getElementById("frameSlider");
    const speedSelect = document.getElementById("speedSelect");
    const caseBadge = document.getElementById("caseBadge");
    const timeLabel = document.getElementById("timeLabel");
    const densityStat = document.getElementById("densityStat");
    const nStat = document.getElementById("nStat");
    const velocityStat = document.getElementById("velocityStat");
    const bStat = document.getElementById("bStat");

    let frame = 0;
    let playing = true;
    let playback = 1;
    let lastTick = 0;
    let accumulator = 0;

    frameSlider.max = DATA.positions.length - 1;
    caseBadge.textContent = `${DATA.model} model | b=${DATA.b} | L=${DATA.L} m`;
    densityStat.textContent = DATA.density.toFixed(2);
    nStat.textContent = DATA.n;
    bStat.textContent = DATA.b.toFixed(2);

    function setupCanvas(canvas) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width: rect.width, height: rect.height };
    }

    function colorForVelocity(v) {
      const vmax = Math.max(1.25, ...DATA.velocities.flat());
      const t = Math.max(0, Math.min(1, v / vmax));
      const stops = [
        [37, 99, 235],
        [15, 118, 110],
        [217, 119, 6],
        [190, 18, 60]
      ];
      const scaled = t * (stops.length - 1);
      const i = Math.min(stops.length - 2, Math.floor(scaled));
      const f = scaled - i;
      const a = stops[i], b = stops[i + 1];
      const rgb = a.map((value, idx) => Math.round(value + (b[idx] - value) * f));
      return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
    }

    function pointOnRing(x, width, height) {
      const cx = width / 2;
      const cy = height / 2 + 4;
      const rx = Math.max(80, width * 0.39);
      const ry = Math.max(58, height * 0.30);
      const theta = -Math.PI / 2 + 2 * Math.PI * (x / DATA.L);
      return [cx + rx * Math.cos(theta), cy + ry * Math.sin(theta)];
    }

    function drawRing() {
      const { ctx, width, height } = setupCanvas(ringCanvas);
      ctx.clearRect(0, 0, width, height);
      const cx = width / 2;
      const cy = height / 2 + 4;
      const rx = Math.max(80, width * 0.39);
      const ry = Math.max(58, height * 0.30);

      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
      ctx.strokeStyle = "#e7eaee";
      ctx.lineWidth = 34;
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
      ctx.strokeStyle = "#bcc5ce";
      ctx.lineWidth = 2;
      ctx.stroke();

      for (let tick = 0; tick < 12; tick++) {
        const x = (tick / 12) * DATA.L;
        const [px, py] = pointOnRing(x, width, height);
        const [qx, qy] = pointOnRing(x + 0.001, width, height);
        const dx = qx - px, dy = qy - py;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len;
        ctx.beginPath();
        ctx.moveTo(px - nx * 11, py - ny * 11);
        ctx.lineTo(px + nx * 11, py + ny * 11);
        ctx.strokeStyle = "#9aa5b1";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      const positions = DATA.positions[frame];
      const velocities = DATA.velocities[frame];
      for (let i = 0; i < positions.length; i++) {
        const [px, py] = pointOnRing(positions[i], width, height);
        ctx.beginPath();
        ctx.arc(px, py, 8.5, 0, 2 * Math.PI);
        ctx.fillStyle = colorForVelocity(velocities[i]);
        ctx.fill();
        ctx.strokeStyle = "#17202a";
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    }

    function drawSpeed() {
      const { ctx, width, height } = setupCanvas(speedCanvas);
      ctx.clearRect(0, 0, width, height);
      const padL = 42, padR = 14, padT = 18, padB = 34;
      const plotW = width - padL - padR;
      const plotH = height - padT - padB;
      const vmax = Math.max(1.0, ...DATA.meanVelocity) * 1.15;

      ctx.strokeStyle = "#d7dce2";
      ctx.lineWidth = 1;
      for (let g = 0; g <= 4; g++) {
        const y = padT + plotH * g / 4;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(width - padR, y);
        ctx.stroke();
      }

      ctx.beginPath();
      for (let i = 0; i <= frame; i++) {
        const x = padL + plotW * i / (DATA.meanVelocity.length - 1);
        const y = padT + plotH * (1 - DATA.meanVelocity[i] / vmax);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 2.5;
      ctx.stroke();

      const mx = padL + plotW * frame / (DATA.meanVelocity.length - 1);
      const my = padT + plotH * (1 - DATA.meanVelocity[frame] / vmax);
      ctx.beginPath();
      ctx.arc(mx, my, 4, 0, 2 * Math.PI);
      ctx.fillStyle = "#be123c";
      ctx.fill();

      ctx.fillStyle = "#64707d";
      ctx.font = "12px system-ui, sans-serif";
      ctx.fillText("0", 8, padT + plotH + 4);
      ctx.fillText(vmax.toFixed(1), 8, padT + 4);
    }

    function drawSpaceTime() {
      const { ctx, width, height } = setupCanvas(spaceCanvas);
      ctx.clearRect(0, 0, width, height);
      const padL = 30, padR = 12, padT = 12, padB = 24;
      const plotW = width - padL - padR;
      const plotH = height - padT - padB;
      const start = Math.max(0, frame - 95);
      const rows = Math.max(1, frame - start);

      ctx.strokeStyle = "#edf0f2";
      ctx.lineWidth = 1;
      for (let g = 0; g <= 4; g++) {
        const x = padL + plotW * g / 4;
        ctx.beginPath();
        ctx.moveTo(x, padT);
        ctx.lineTo(x, padT + plotH);
        ctx.stroke();
      }

      for (let f = start; f <= frame; f++) {
        const y = padT + plotH * (f - start) / rows;
        for (let i = 0; i < DATA.positions[f].length; i++) {
          const x = padL + plotW * DATA.positions[f][i] / DATA.L;
          ctx.fillStyle = colorForVelocity(DATA.velocities[f][i]);
          ctx.fillRect(x, y, 1.8, 1.8);
        }
      }

      ctx.fillStyle = "#64707d";
      ctx.font = "12px system-ui, sans-serif";
      ctx.fillText("x = 0", padL, height - 7);
      ctx.fillText(`x = ${DATA.L.toFixed(1)} m`, width - padR - 72, height - 7);
    }

    function updateStats() {
      frameSlider.value = frame;
      timeLabel.textContent = `t = ${DATA.time[frame].toFixed(2)} s`;
      velocityStat.textContent = DATA.meanVelocity[frame].toFixed(2);
    }

    function draw() {
      drawRing();
      drawSpeed();
      drawSpaceTime();
      updateStats();
    }

    function animate(timestamp) {
      if (!lastTick) lastTick = timestamp;
      const delta = timestamp - lastTick;
      lastTick = timestamp;
      if (playing) {
        accumulator += delta * playback;
        while (accumulator >= DATA.intervalMs) {
          frame = (frame + 1) % DATA.positions.length;
          accumulator -= DATA.intervalMs;
        }
      }
      draw();
      requestAnimationFrame(animate);
    }

    playButton.addEventListener("click", () => {
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
    });
    frameSlider.addEventListener("input", () => {
      frame = Number(frameSlider.value);
      playing = false;
      playButton.textContent = "Play";
      draw();
    });
    speedSelect.addEventListener("change", () => {
      playback = Number(speedSelect.value);
    });
    window.addEventListener("resize", draw);
    draw();
    requestAnimationFrame(animate);
  </script>
